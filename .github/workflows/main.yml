name: Daily Stock Data Update

on:
  schedule:
    # 每天日本时间（JST）早上 8:00 运行（GitHub 使用 UTC 时间，JST 比 UTC 快 9 小时，所以填 23:00 UTC）
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许你手动点击运行按钮进行测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance pandas

      - name: Run script
        run: python your_script_name.py # 将此处替换为你仓库里的 Python 文件名

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add Nikkei225_Live_Data.csv
          git commit -m "Update stock data"
          git push
